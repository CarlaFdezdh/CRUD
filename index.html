<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario de viajes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="overlay" id="overlay"></div>
    
    <div class="window">
        <header class="toolbar toolbar-header">
            <h1>Mi Diario de Viajes</h1>
        </header>
        
        <div class="window-content">
            <div class="pane-group">
                <div class="pane">
                    <div class="wrapper" id="wrapper">
                        <!-- Las entradas se cargarán aquí -->
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="toolbar toolbar-footer">
            <div id="nav">
                <button id="searchBtn">
                    <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                    </svg>
                    Búsquedas
                </button>

                <button id="newEntryBtn">
                    <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                    </svg>
                    Nueva Entrada
                </button>

                <button id="todos">
                    <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                    </svg>
                    Todas las entradas
                </button>
            </div>
        </footer>
    </div>

    <!-- Drawer de Búsqueda -->
    <div class="drawer" id="searchDrawer" style="display: none;">
        <button class="close-drawer" id="closeSearch">×</button>
        <label id="sub">🔍 Buscar por lugar</label>
        <div class="input-group">
            <input type="text" placeholder="Lugar..." id="lugarInput">
        </div>
        <button id="searchButton">
            <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
            </svg>
            Buscar
        </button>
    </div>

    <!-- Drawer de Nueva Entrada -->
    <div class="drawer" id="newEntryDrawer" style="display: none;">
        <button class="close-drawer" id="closeNewEntry">×</button>
        <label id="sub">📝 Añadir nueva entrada</label>
        
        <div class="input-group">
            <label>Lugar</label>
            <input type="text" placeholder="Ej: París, Francia" id="lugarNuevoInput">
        </div>
        
        <div class="input-group">
            <label>Fecha</label>
            <input type="date" id="fechaInput">
        </div>
        
        <div class="input-group">
            <label>Notas</label>
            <textarea placeholder="Describe tu experiencia..." id="notasInput"></textarea>
        </div>
        
        <div class="input-group">
            <label>Valoración (1-5)</label>
            <input type="number" id="valoracionInput" min="1" max="5" placeholder="1-5">
        </div>
        
        <div class="input-group">
            <label>Imagen</label>
            <input type="file" id="imagenInput" accept="image/*">
        </div>
        
        <button id="addButton">
            <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
            </svg>
            Añadir
        </button>
    </div>

  

  <script src="app.js"></script>
</body>
</html>
